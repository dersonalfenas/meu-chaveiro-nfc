{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-transparent border-0 pt-4">
                    <h4 class="fw-bold mb-0">🏷️ Criar Nova Tag</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Nome *</label>
                                <input type="text" name="nome" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Cargo</label>
                                <input type="text" name="cargo" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Empresa</label>
                            <input type="text" name="empresa" class="form-control">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Telefone</label>
                                <input type="text" name="telefone" class="form-control" placeholder="(11) 99999-9999">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">WhatsApp</label>
                                <input type="text" name="whatsapp" class="form-control" placeholder="11999999999">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="contato@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Site</label>
                            <input type="url" name="site" class="form-control" placeholder="https://meusite.com">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Instagram</label>
                                <input type="text" name="instagram" class="form-control" placeholder="@usuario">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">LinkedIn</label>
                                <input type="text" name="linkedin" class="form-control" placeholder="usuario">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cor Principal</label>
                            <input type="color" name="cor_primaria" class="form-control form-control-color" value="#667eea">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Criar Tag</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
