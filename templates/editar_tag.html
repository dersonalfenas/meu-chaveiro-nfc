{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-transparent border-0 pt-4">
                    <h4 class="fw-bold mb-0">✏️ Editar Tag</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Nome *</label>
                                <input type="text" name="nome" class="form-control" value="{{ tag.nome }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Cargo</label>
                                <input type="text" name="cargo" class="form-control" value="{{ tag.cargo or '' }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Empresa</label>
                            <input type="text" name="empresa" class="form-control" value="{{ tag.empresa or '' }}">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Telefone</label>
                                <input type="text" name="telefone" class="form-control" value="{{ tag.telefone or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">WhatsApp</label>
                                <input type="text" name="whatsapp" class="form-control" value="{{ tag.whatsapp or '' }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ tag.email or '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Site</label>
                            <input type="url" name="site" class="form-control" value="{{ tag.site or '' }}">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Instagram</label>
                                <input type="text" name="instagram" class="form-control" value="{{ tag.instagram or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">LinkedIn</label>
                                <input type="text" name="linkedin" class="form-control" value="{{ tag.linkedin or '' }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cor Principal</label>
                            <input type="color" name="cor_primaria" class="form-control form-control-color" value="{{ tag.cor_primaria or '#667eea' }}">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Salvar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
