{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5 text-center">
                    <i class="fas fa-credit-card fa-4x text-primary mb-3"></i>
                    <h4 class="fw-bold">💳 Pagamento</h4>
                    <div class="alert alert-info mt-3">
                        <strong>Plano:</strong> {{ assinatura.plano|title }}<br>
                        <strong>Valor:</strong> R$ {{ "%.2f"|format(assinatura.valor) }}<br>
                        <strong>Vencimento:</strong> {{ assinatura.data_fim.strftime('%d/%m/%Y') }}
                    </div>
                    <div class="alert alert-warning">
                        ⚠️ Integração com Mercado Pago será configurada em breve.
                    </div>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary rounded-pill px-4">Voltar</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
