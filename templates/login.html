{% extends "base.html" %}

{% block title %}Login - NFC Connect{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                        <h4 class="fw-bold">Bem-vindo de volta</h4>
                        <p class="text-muted">Faça login para acessar seu painel</p>
                    </div>
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="fas fa-envelope text-muted"></i>
                                </span>
                                <input type="email" name="email" class="form-control border-start-0" placeholder="seu@email.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Senha</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="fas fa-key text-muted"></i>
                                </span>
                                <input type="password" name="senha" class="form-control border-start-0" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">
                            <i class="fas fa-sign-in-alt me-2"></i> Entrar
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted">Não tem conta?</span>
                        <a href="{{ url_for('auth.registro') }}" class="text-primary fw-semibold text-decoration-none">Cadastre-se</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
